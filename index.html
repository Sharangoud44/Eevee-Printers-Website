<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eevee Printers</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#0b1220;
    color:white;
}

/* HERO */
.hero {
    height:90vh;
    background: linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)), url('bg.jpg');
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.logo {
    width:200px;
    margin-bottom:20px;
}

.hero p {
    color:#ddd;
}

.hero button {
    margin-top:20px;
    padding:12px 25px;
    background:#FFD700;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

/* SECTION */
.section-title {
    text-align:center;
    margin:40px 0;
    font-size:28px;
}

/* CARDS */
.container {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card {
    background:#1c2742;
    border-radius:12px;
    overflow:hidden;
    transition:0.3s;
    cursor:pointer;
}

.card img {
    width:100%;
    height:180px;
    object-fit:cover;
}

.card h3 {
    text-align:center;
    padding:15px;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow:0 10px 20px rgba(0,0,0,0.5);
}

/* POPUP */
.popup {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
}

.popup-content {
    background:white;
    color:black;
    padding:20px;
    margin:10% auto;
    width:300px;
    border-radius:10px;
    text-align:center;
}

/* FOOTER */
footer {
    background:#111;
    padding:30px;
    text-align:center;
    margin-top:40px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <img src="logo.png" class="logo">
    <p>Premium Printing & Packaging Solutions</p>
    <button onclick="scrollToServices()">Explore Services</button>
</div>

<h2 class="section-title">Our Services</h2>

<!-- SERVICES -->
<div class="container">

<div class="card" onclick="openTypes('Visiting Cards')">
<img src="https://images.unsplash.com/photo-1586953208448-b95a79798f07">
<h3>Visiting Cards</h3>
</div>

<div class="card" onclick="openTypes('Stickers')">
<img src="https://images.unsplash.com/photo-1593032465175-481ac7f401a0">
<h3>Stickers</h3>
</div>

<div class="card" onclick="openTypes('Books')">
<img src="https://images.unsplash.com/photo-1512820790803-83ca734da794">
<h3>Books</h3>
</div>

<div class="card" onclick="openTypes('Paper Bags')">
<img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
<h3>Paper Bags</h3>
</div>

</div>

<!-- TYPE POPUP -->
<div class="popup" id="typePopup">
<div class="popup-content">
<h3 id="productTitle"></h3>
<button onclick="selectType('Standard')">Standard</button><br><br>
<button onclick="selectType('Premium')">Premium</button><br><br>
<button onclick="closePopup()">Close</button>
</div>
</div>

<!-- FORM POPUP -->
<div class="popup" id="formPopup">
<div class="popup-content">
<h3>Order Details</h3>

<input placeholder="Quantity" id="qty"><br><br>
<input placeholder="GSM" id="gsm"><br><br>
<input placeholder="Details" id="details"><br><br>

<button onclick="sendWhatsApp()">Submit</button>
</div>
</div>

<!-- FOOTER -->
<footer>
<h3>Contact Us</h3>
<p>📍 Hyderabad</p>
<p>📞 +91 9999999999</p>
<p>📧 eeveeprinters@gmail.com</p>
</footer>

<script>
let product="", type="";

function scrollToServices(){
    window.scrollTo({top:600,behavior:'smooth'});
}

function openTypes(p){
    product=p;
    document.getElementById("productTitle").innerText=p;
    document.getElementById("typePopup").style.display="block";
}

function selectType(t){
    type=t;
    document.getElementById("typePopup").style.display="none";
    document.getElementById("formPopup").style.display="block";
}

function closePopup(){
    document.getElementById("typePopup").style.display="none";
    document.getElementById("formPopup").style.display="none";
}

function sendWhatsApp(){
    let msg=`Order Request:
Product: ${product}
Type: ${type}
Quantity: ${qty.value}
GSM: ${gsm.value}
Details: ${details.value}`;

    window.open("https://wa.me/919999999999?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
