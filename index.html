<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eevee Printers</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family: 'Poppins', sans-serif;
    background:#0a0f1f;
    color:white;
}

/* HERO */
.hero {
    height:100vh;
    background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url('https://github.com/Sharangoud44/Eevee-Printers-Website/blob/main/modern-printing-factory-with-industrial-equipment-and-workers-in-production-environment-photo.jpg');
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* LOGO */
.logo {
    width:220px;
    margin-bottom:20px;
    border-radius:12px;
    mix-blend-mode: lighten;
}

/* TEXT */
.hero h1 {
    font-size:50px;
    color:#FFD700;
    text-shadow:0 0 25px rgba(255,215,0,0.6);
}

.hero p {
    color:#ccc;
}

/* BUTTON */
.hero button {
    margin-top:20px;
    padding:14px 30px;
    background:linear-gradient(45deg,#FFD700,#ffb300);
    border:none;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.hero button:hover {
    transform:scale(1.1);
}

/* SECTION */
.section-title {
    text-align:center;
    margin:60px 0 20px;
    font-size:32px;
}

/* CARDS */
.container {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
    padding:30px;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-radius:15px;
    overflow:hidden;
    transition:0.4s;
    cursor:pointer;
    border:1px solid rgba(255,255,255,0.1);
}

.card img {
    width:100%;
    height:180px;
    object-fit:cover;
}

.card h3 {
    text-align:center;
    padding:15px;
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* POPUP */
.popup {
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.8);
}

.popup-content {
    background:white;
    color:black;
    padding:25px;
    margin:10% auto;
    width:320px;
    border-radius:12px;
    text-align:center;
}

/* FOOTER */
footer {
    background:#050814;
    padding:40px;
    text-align:center;
    margin-top:50px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <img src="eevee.png" class="logo">
    <h1>Eevee Printers</h1>
    <p>Premium Printing & Packaging Solutions</p>
    <button onclick="scrollToServices()">Explore Services</button>
</div>

<h2 class="section-title">Our Services</h2>

<!-- SERVICES -->
<div class="container">

<div class="card" onclick="openTypes('Visiting Cards')">
<img src="https://images.unsplash.com/photo-1586953208448-b95a79798f07">
<h3>Visiting Cards</h3>
</div>

<div class="card" onclick="openTypes('Stickers')">
<img src="https://images.unsplash.com/photo-1593032465175-481ac7f401a0">
<h3>Stickers</h3>
</div>

<div class="card" onclick="openTypes('Books')">
<img src="https://images.unsplash.com/photo-1512820790803-83ca734da794">
<h3>Books</h3>
</div>

<div class="card" onclick="openTypes('Paper Bags')">
<img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
<h3>Paper Bags</h3>
</div>

</div>

<!-- TYPE POPUP -->
<div class="popup" id="typePopup">
<div class="popup-content">
<h3 id="productTitle"></h3>
<button onclick="selectType('Standard')">Standard</button><br><br>
<button onclick="selectType('Premium')">Premium</button><br><br>
<button onclick="closePopup()">Close</button>
</div>
</div>

<!-- FORM POPUP -->
<div class="popup" id="formPopup">
<div class="popup-content">
<h3>Order Details</h3>

<input placeholder="Quantity" id="qty"><br><br>
<input placeholder="GSM" id="gsm"><br><br>
<input placeholder="Details" id="details"><br><br>

<button onclick="sendWhatsApp()">Submit</button>
</div>
</div>

<!-- FOOTER -->
<footer>
<h2>Eevee Printers</h2>
<p>📍 Hyderabad</p>
<p>📞 +91 9999999999</p>
<p>📧 eeveeprinters@gmail.com</p>
</footer>

<script>
let product="", type="";

function scrollToServices(){
    window.scrollTo({top:window.innerHeight,behavior:'smooth'});
}

function openTypes(p){
    product=p;
    document.getElementById("productTitle").innerText=p;
    document.getElementById("typePopup").style.display="block";
}

function selectType(t){
    type=t;
    document.getElementById("typePopup").style.display="none";
    document.getElementById("formPopup").style.display="block";
}

function closePopup(){
    document.getElementById("typePopup").style.display="none";
    document.getElementById("formPopup").style.display="none";
}

function sendWhatsApp(){
    let msg=`Order Request:
Product: ${product}
Type: ${type}
Quantity: ${qty.value}
GSM: ${gsm.value}
Details: ${details.value}`;

    window.open("https://wa.me/919999999999?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
