<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eevee Printers</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: #0c0f1d;
      color: white;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 3em;
      color: #f7b731;
    }

    header h2 {
      font-size: 1.2em;
      color: #91a3ff;
      margin-top: 10px;
    }

    h3 {
      text-align: center;
      font-size: 1.8em;
      color: #ffd36f;
      margin-bottom: 30px;
    }

    .catalog {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1c2236;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
      transition: transform 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.4);
    }

    .card h4 {
      margin-bottom: 10px;
    }

    .card button {
      background: #ffd36f;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    .card button:hover {
      background: #ffcc00;
    }

    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1c2236;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
      z-index: 10;
      display: none;
      width: 90%;
      max-width: 400px;
    }

    .popup input, .popup textarea {
      width: 100%;
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }

    .popup button {
      background: #ffd36f;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      z-index: 5;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 2em;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Eevee Printers</h1>
    <h2>Premium Printing & Packaging</h2>
  </header>

  <h3>Our Catalogue</h3>
  <div class="catalog" id="catalog"></div>

  <div class="overlay" id="overlay"></div>
  <div class="popup" id="orderPopup">
    <h3 id="popupTitle"></h3>
    <input type="text" placeholder="Your Name" id="custName" />
    <input type="number" placeholder="Quantity" id="quantity" />
    <textarea placeholder="Description / Requirements" rows="4" id="description"></textarea>
    <button onclick="submitOrder()">Submit Order</button>
  </div>

  <script>
    const items = [
      'Visiting Cards', 'Box Making', 'Hospital Files', 'Paper Bags', 'Brouchers / Pamplets', 'Plastic Carry Bag Covers',
      'Stickers', 'Envelopes', 'Danglers', 'Books', 'ID Cards', 'Pouches', 'Bill Books', 'Restaurant Tray Mats', 'T-shirt Printing'
    ];

    const catalog = document.getElementById('catalog');
    const overlay = document.getElementById('overlay');
    const popup = document.getElementById('orderPopup');
    const popupTitle = document.getElementById('popupTitle');
    let currentItem = '';

    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <h4>${item}</h4>
        <button onclick="openPopup('${item}')">Order Now</button>
      `;
      catalog.appendChild(card);
    });

    function openPopup(item) {
      currentItem = item;
      popupTitle.innerText = `Order: ${item}`;
      overlay.style.display = 'block';
      popup.style.display = 'block';
    }

    overlay.onclick = () => {
      overlay.style.display = 'none';
      popup.style.display = 'none';
    };

    function submitOrder() {
      const name = document.getElementById('custName').value;
      const quantity = document.getElementById('quantity').value;
      const description = document.getElementById('description').value;

      const message = `Order for: ${currentItem}%0AName: ${name}%0AQuantity: ${quantity}%0ADescription: ${description}`;
      const whatsapp = '91XXXXXXXXXX'; // Replace with your number
      window.open(`https://wa.me/${whatsapp}?text=${message}`);
    }
  </script>
</body>
</html>
